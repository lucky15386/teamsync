server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/teamsync?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  cache:
    type: simple
    cache-names: projects, teams, users, notifications

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.teamsync.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT 配置
jwt:
  secret: TeamSyncSecretKey2026ForCourseDesignProjectVeryLongKey
  expiration: 86400000

# 文件上传路径 - 使用用户目录下的teamsync-uploads文件夹
file:
  upload-dir: ~/teamsync-uploads/
